<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Fallback title/description/canonical/OG/Twitter tags for the brief
         pre-hydration window and for any consumer that doesn't execute JS.
         Every route overrides these at render time via src/components/SEO.js
         (React 19 hoists <title>/<meta>/<link> rendered anywhere in the tree
         into <head>). Only one static copy of each is kept here — duplicate
         static + rendered copies of a duplicable tag like <meta> or <link>
         don't get deduped the way <title> does, so keeping just one avoids
         the SEO component's per-route values silently losing to a stale
         first-in-DOM-order duplicate. -->
    <title>Path To Mexico | A Different Rhythm Of Life</title>

    <meta
      name="keywords"
      content="Path To Mexico, Mexico relocation, move to Mexico, relocating to Mexico, Playa del Carmen relocation, Tulum relocation, Mexico lifestyle, Cielo Nuevo"
    />

    <meta name="author" content="Path To Mexico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B0B0A" />

    <!-- Fonts: moved out of a CSS @import (src/index.css), which forced a
         serial request chain (HTML -> CSS -> @import CSS -> font files).
         preconnect + a direct stylesheet link let the browser discover and
         start fetching fonts in parallel with everything else. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/path-to-mexico-icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Path To Mexico" />
    <meta property="og:image" content="https://pathtomexico.com/og-image.jpg?v=3" />
    <meta property="og:image:alt" content="Path To Mexico — A different rhythm of life." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://pathtomexico.com/og-image.jpg?v=3" />

    <meta name="apple-mobile-web-app-title" content="Path To Mexico" />
    <meta name="application-name" content="Path To Mexico" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Path To Mexico",
        "alternateName": "Cielo Nuevo",
        "url": "https://pathtomexico.com",
        "description": "Relocation guidance, trusted local connections, and lifestyle support for people considering a new life in Mexico.",
        "sameAs": []
      }
    </script>
  </head>

  <body>
    <noscript>
      Path To Mexico helps people explore relocation, trusted local connections,
      and a different rhythm of life in Mexico. Please enable JavaScript to view this site.
    </noscript>

    <div id="root"></div>
  </body>
</html>
